<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="170" y1="60" x2="1180" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3A3A"/>
      <stop offset="0.45" stop-color="#FF2A2A"/>
      <stop offset="0.75" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#FFB800"/>
    </linearGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="3" width="8" height="1.2" fill="#B7B7B7" opacity="0.16"/>
    </pattern>

    <mask id="titleMask">
      <rect width="1400" height="620" fill="black"/>
      <text x="165" y="190"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">HELLO,</text>
      <text x="165" y="370"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">I'M JASON</text>
    </mask>

    <linearGradient id="stroke1" x1="48" y1="470" x2="348" y2="566" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2D000"/>
      <stop offset="1" stop-color="#958300"/>
    </linearGradient>
    <linearGradient id="stroke2" x1="378" y1="470" x2="678" y2="566" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4747"/>
      <stop offset="1" stop-color="#861818"/>
    </linearGradient>
    <linearGradient id="stroke3" x1="708" y1="470" x2="1008" y2="566" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F5A0"/>
      <stop offset="1" stop-color="#008C5C"/>
    </linearGradient>
    <linearGradient id="stroke4" x1="1038" y1="470" x2="1338" y2="566" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4C300"/>
      <stop offset="1" stop-color="#8B7B00"/>
    </linearGradient>
  </defs>

  <!-- Title fill -->
  <g mask="url(#titleMask)">
    <rect width="1400" height="620" fill="url(#titleGrad)"/>
    <rect width="1400" height="620" fill="url(#scanlines)"/>
  </g>

  <!-- Four transparent boxes -->
  <rect x="48" y="470" width="300" height="96" rx="20" fill="rgba(8,10,18,0.18)" stroke="url(#stroke1)" stroke-width="2"/>
  <rect x="378" y="470" width="300" height="96" rx="20" fill="rgba(8,10,18,0.18)" stroke="url(#stroke2)" stroke-width="2"/>
  <rect x="708" y="470" width="300" height="96" rx="20" fill="rgba(8,10,18,0.18)" stroke="url(#stroke3)" stroke-width="2"/>
  <rect x="1038" y="470" width="300" height="96" rx="20" fill="rgba(8,10,18,0.18)" stroke="url(#stroke4)" stroke-width="2"/>

  <text x="198" y="523" text-anchor="middle" fill="#FFE600" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">PROFILE VIEWS</text>

  <text x="528" y="517" text-anchor="middle" fill="#FF4C4C" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">TOP LANGUAGE</text>

  <text x="858" y="523" text-anchor="middle" fill="#00FFA6" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">FOLLOWERS</text>

  <text x="1188" y="523" text-anchor="middle" fill="#E1D000" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">STARS</text>
</svg>
