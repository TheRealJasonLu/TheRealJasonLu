<svg width="900" height="400" viewBox="0 0 900 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="170" y1="60" x2="1180" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3A3A"/>
      <stop offset="0.45" stop-color="#FF2A2A"/>
      <stop offset="0.75" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#FFB800"/>
    </linearGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="3" width="8" height="1.2" fill="#B7B7B7" opacity="0.16"/>
    </pattern>

    <mask id="titleMask">
      <rect width="900" height="400" fill="black"/>
      
      <!-- SHIFTED LEFT -->
      <text x="85" y="190"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">HELLO,</text>

      <text x="85" y="370"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">I'M JASON</text>
    </mask>
  </defs>

  <g mask="url(#titleMask)">
    <rect width="900" height="400" fill="url(#titleGrad)"/>
    <rect width="900" height="400" fill="url(#scanlines)"/>
  </g>
</svg>