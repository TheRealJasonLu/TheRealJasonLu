<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1400" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08070C"/>
      <stop offset="0.52" stop-color="#070A14"/>
      <stop offset="1" stop-color="#05060A"/>
    </linearGradient>

    <radialGradient id="glowRed" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(700 170) rotate(0) scale(320 150)">
      <stop offset="0" stop-color="#FF3E3E" stop-opacity="0.14"/>
      <stop offset="0.7" stop-color="#FF3E3E" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#FF3E3E" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1180 520) rotate(0) scale(260 180)">
      <stop offset="0" stop-color="#2D2BFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2D2BFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGrad" x1="280" y1="40" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4444"/>
      <stop offset="0.3" stop-color="#FF2222"/>
      <stop offset="0.6" stop-color="#FFD700"/>
      <stop offset="0.85" stop-color="#FF4444"/>
      <stop offset="1" stop-color="#FFD700"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="stroke1" x1="40" y1="0" x2="340" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0C200"/>
      <stop offset="1" stop-color="#8D7A00"/>
    </linearGradient>

    <linearGradient id="stroke2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4A4A"/>
      <stop offset="1" stop-color="#7E1818"/>
    </linearGradient>

    <linearGradient id="stroke3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00F08A"/>
      <stop offset="1" stop-color="#0A6B44"/>
    </linearGradient>

    <linearGradient id="stroke4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BFB100"/>
      <stop offset="1" stop-color="#6B6200"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="620" fill="url(#bgGrad)"/>

  <rect width="1400" height="620" fill="url(#glowRed)"/>
  <rect width="1400" height="620" fill="url(#glowBlue)"/>

  <circle cx="150" cy="90" r="140" fill="#9E1717" opacity="0.08"/>
  <circle cx="1310" cy="110" r="160" fill="#180C0C" opacity="0.15"/>
  <circle cx="1220" cy="520" r="220" fill="#2D2BFF" opacity="0.07"/>

  <g opacity="0.18">
    <circle cx="95" cy="470" r="2" fill="#FFD84D"/>
    <circle cx="1210" cy="455" r="2" fill="#FFD84D"/>
    <circle cx="1080" cy="340" r="1.8" fill="#FF5A5A"/>
    <circle cx="310" cy="535" r="1.8" fill="#FFD84D"/>
    <circle cx="870" cy="505" r="2.2" fill="#FF5A5A"/>
  </g>

  <text x="210" y="190"
        fill="url(#titleGrad)"
        font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
        font-size="160"
        font-weight="900"
        letter-spacing="-5"
        filter="url(#softGlow)">HELLO,</text>

  <text x="210" y="355"
        fill="url(#titleGrad)"
        font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
        font-size="180"
        font-weight="900"
        letter-spacing="-6"
        filter="url(#softGlow)">I'M JASON</text>

  <rect x="48" y="470" width="300" height="96" rx="20" fill="#0B0D15" fill-opacity="0.6" stroke="url(#stroke1)" stroke-width="2"/>
  <rect x="378" y="470" width="300" height="96" rx="20" fill="#0B0D15" fill-opacity="0.6" stroke="url(#stroke2)" stroke-width="2"/>
  <rect x="708" y="470" width="300" height="96" rx="20" fill="#0B0D15" fill-opacity="0.6" stroke="url(#stroke3)" stroke-width="2"/>
  <rect x="1038" y="470" width="300" height="96" rx="20" fill="#0B0D15" fill-opacity="0.6" stroke="url(#stroke4)" stroke-width="2"/>

  <text x="198" y="524" text-anchor="middle" fill="#FFD500" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">PROFILE VIEWS</text>
  <text x="528" y="524" text-anchor="middle" fill="#FF4A4A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">TOP LANGUAGE</text>
  <text x="858" y="524" text-anchor="middle" fill="#00E676" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">FOLLOWERS</text>
  <text x="1188" y="524" text-anchor="middle" fill="#CDBE00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="1">STARS</text>

  <text x="198" y="550" text-anchor="middle" fill="#747C8F" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3">LIVE</text>
  <text x="528" y="550" text-anchor="middle" fill="#747C8F" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3">PYTHON</text>
  <text x="858" y="550" text-anchor="middle" fill="#747C8F" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3">LIVE</text>
  <text x="1188" y="550" text-anchor="middle" fill="#747C8F" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3">LIVE</text>
</svg>