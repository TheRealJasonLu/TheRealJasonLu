<svg width="900" height="400" viewBox="0 0 900 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="60" y1="80" x2="880" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2D3A"/>
      <stop offset="18%" stop-color="#FF313D"/>
      <stop offset="38%" stop-color="#FF2A2A"/>
      <stop offset="58%" stop-color="#FF3A1A"/>
      <stop offset="76%" stop-color="#FF5A0A"/>
      <stop offset="90%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>

    <linearGradient id="bgGlow" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A0A12" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="3" width="8" height="1.1" fill="#FFFFFF" opacity="0.09"/>
    </pattern>

    <mask id="titleMask">
      <rect width="900" height="400" fill="black"/>

      <text x="85" y="190"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">HELLO,</text>

      <text x="85" y="370"
            fill="white"
            font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
            font-size="188"
            font-weight="900"
            letter-spacing="-2">I'M JASON</text>
    </mask>
  </defs>

  <g mask="url(#titleMask)">
    <rect width="900" height="400" fill="url(#titleGrad)"/>
    <rect width="900" height="400" fill="url(#bgGlow)"/>
    <rect width="900" height="400" fill="url(#scanlines)"/>
  </g>
</svg>